<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Varsha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #7A2F45 0%, #3D1524 70%);
  font-family: 'Lora', Georgia, serif; color: #FFF5E9;
  padding: 40px 24px; text-align: center;
  -webkit-font-smoothing: antialiased;
}

.title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(2rem, 6vw, 3.2rem);
  margin-bottom: 8px;
  opacity: 0; animation: fadeUp 1s ease 0.3s forwards;
}

.subtitle {
  font-size: clamp(0.85rem, 2.2vw, 1rem);
  color: rgba(255,245,233,0.5); font-style: italic;
  margin-bottom: 60px;
  opacity: 0; animation: fadeUp 1s ease 0.6s forwards;
}

.doors {
  display: flex; flex-direction: column; gap: 20px;
  width: 100%; max-width: 360px;
  opacity: 0; animation: fadeUp 1s ease 0.9s forwards;
}

.door {
  display: block; padding: 28px 24px;
  border-radius: 14px; text-decoration: none; color: #FFF5E9;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative; overflow: hidden;
}

.door:active { transform: scale(0.97); }

.door-letter {
  background: linear-gradient(135deg, rgba(183,110,121,0.2), rgba(212,175,127,0.1));
  border: 1px solid rgba(183,110,121,0.3);
  backdrop-filter: blur(10px);
}

.door-memories {
  background: linear-gradient(135deg, rgba(212,175,127,0.15), rgba(183,110,121,0.08));
  border: 1px solid rgba(212,175,127,0.25);
  backdrop-filter: blur(10px);
}

.door:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

.door-icon { font-size: 1.6rem; margin-bottom: 10px; }

.door-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; font-weight: 600;
  margin-bottom: 6px;
}

.door-desc {
  font-size: 0.8rem; color: rgba(255,245,233,0.5);
  font-style: italic; line-height: 1.6;
}

.footer {
  margin-top: 60px; font-family: 'Dancing Script', cursive;
  font-size: 1.1rem; color: rgba(255,245,233,0.3);
  opacity: 0; animation: fadeUp 1s ease 1.2s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="title">Happy Birthday, Vaaave</div>
<p class="subtitle">I made you something.</p>

<div class="doors">
  <a href="story.html" class="door door-letter">
    <div class="door-icon">&#9993;&#65039;</div>
    <div class="door-title">Read The Letter</div>
    <div class="door-desc">A story. Just scroll. Take your time.</div>
  </a>

  <a href="memories.html" class="door door-memories">
    <div class="door-icon">&#10024;</div>
    <div class="door-title">Explore The Memories</div>
    <div class="door-desc">Photos, videos, reels, and everything in between.</div>
  </a>
</div>

<div class="footer">&mdash; Arpithan</div>

</body>
</html>
